<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Webkolog</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: #ffffff;
        }
        .landing-card {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 20px;
            padding: 3rem 2rem;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.3);
            max-width: 600px;
            width: 100%;
        }
        .btn-social {
            width: 50px;
            height: 50px;
            line-height: 50px;
            padding: 0;
            text-align: center;
            border-radius: 50%;
            font-size: 1.4rem;
            color: #fff;
            margin: 0.5rem;
            transition: all 0.3s ease;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            border: none;
        }
        .btn-social:hover {
            transform: translateY(-5px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
            color: #fff;
        }
        /* Sosyal Medya Marka Renkleri */
        .btn-facebook { background-color: #3b5998; }
        .btn-x { background-color: #000000; }
        .btn-instagram { background: linear-gradient(45deg, #f09433 0%, #e6683c 25%, #dc2743 50%, #cc2366 75%, #bc1888 100%); }
        .btn-pinterest { background-color: #bd081c; }
        .btn-github { background-color: #333333; }
        .btn-linkedin { background-color: #0077b5; }
        .btn-youtube { background-color: #ff0000; }
        .btn-tiktok { background-color: #010101; }

        .site-link {
            font-size: 1.5rem;
            font-weight: 600;
            color: #00f2fe;
            text-decoration: none;
            transition: color 0.3s ease;
        }
        .site-link:hover {
            color: #4facfe;
        }
    </style>
</head>
<body>

<div class="container d-flex justify-content-center">
    <div class="landing-card text-center px-4">
        
        <div class="mb-4">
            <i class="fa-solid fa-globe fa-4x text-info animate-pulse"></i>
        </div>

        <h1 class="display-5 fw-bold mb-3">Hello!</h1>
        <p class="lead mb-4">
            My personal website is <a href="https://webkolog.net" target="_blank" class="site-link">webkolog.net</a>
        </p>
        
        <hr class="my-4 border-light opacity-25">

        <p class="text-white-50 small text-uppercase fw-bold mb-3">Follow me</p>
        <div class="d-flex flex-wrap justify-content-center gap-2">
            
            <a href="https://github.com/webkolog" target="_blank" class="btn-social btn-github" title="GitHub">
                <i class="fa-brands fa-github"></i>
            </a>
            
            <a href="https://linkedin.com/in/webkolog" target="_blank" class="btn-social btn-linkedin" title="LinkedIn">
                <i class="fa-brands fa-linkedin-in"></i>
            </a>

            <a href="https://x.com/webkolog" target="_blank" class="btn-social btn-x" title="X (Twitter)">
                <i class="fa-brands fa-x-twitter"></i>
            </a>

            <a href="https://instagram.com/webkolog" target="_blank" class="btn-social btn-instagram" title="Instagram">
                <i class="fa-brands fa-instagram"></i>
            </a>

            <a href="https://youtube.com/@webkolog" target="_blank" class="btn-social btn-youtube" title="YouTube">
                <i class="fa-brands fa-youtube"></i>
            </a>

            <a href="https://tiktok.com/@webkolog" target="_blank" class="btn-social btn-tiktok" title="TikTok">
                <i class="fa-brands fa-tiktok"></i>
            </a>

            <a href="https://facebook.com/webkolog" target="_blank" class="btn-social btn-facebook" title="Facebook">
                <i class="fa-brands fa-facebook-f"></i>
            </a>

            <a href="https://pinterest.com/webkolog" target="_blank" class="btn-social btn-pinterest" title="Pinterest">
                <i class="fa-brands fa-pinterest-p"></i>
            </a>

        </div>

    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
